name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-flight runs for the same branch when a new push lands.
# Saves CI minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # ── Engine-purity guard ───────────────────────────────────────────
      # The calculator must remain pure: no DOM, no fetch, no I/O.
      # See docs/launch-checklist.md and src/lib/calculator/index.ts header.
      - name: Guard — calculator engine purity (no DOM/fetch in src/lib/calculator)
        run: |
          out=$(grep -rEn '^[^/]*\b(window\.|document\.|localStorage|fetch\()' src/lib/calculator || true)
          if [ -n "$out" ]; then
            echo "❌ Calculator engine purity violation:"
            echo "$out"
            exit 1
          fi
          echo "✓ Engine pure"

      # ── Secret-leak guard ─────────────────────────────────────────────
      # Only PUBLIC_* env vars and the astro:env schema-declared
      # PLAUSIBLE_DOMAIN / REPORT_ENDPOINT can be referenced from client code.
      # Two-step (POSIX ERE; avoids PCRE lookahead portability issues).
      - name: Guard — no secret env vars in client code
        run: |
          refs=$(grep -rEho 'import\.meta\.env\.[A-Z_][A-Z0-9_]*' src/components src/pages src/layouts 2>/dev/null | sort -u || true)
          if [ -z "$refs" ]; then
            echo "✓ No import.meta.env references in client code"
            exit 0
          fi
          bad=$(echo "$refs" | grep -vE '^import\.meta\.env\.(PUBLIC_[A-Z0-9_]+|PLAUSIBLE_DOMAIN|REPORT_ENDPOINT|MODE|DEV|PROD|BASE_URL|SITE|SSR)$' || true)
          if [ -n "$bad" ]; then
            echo "❌ Disallowed env refs in client code:"
            echo "$bad"
            exit 1
          fi
          echo "✓ All client env refs are allowlisted ($(echo "$refs" | wc -l | tr -d ' ') unique refs)"

      - name: Vitest (calculator + permalink — 47 tests)
        run: npm test

      - name: Astro build (static pages + sitemap + schema)
        run: npm run build

      # ── Client bundle size cap ────────────────────────────────────────
      # Wizard is the only React island and the only place the lares
      # JSON could leak in. Cap the gzip'd Wizard chunk at 20 kB and
      # total client JS at 90 kB (React runtime is ~58 kB on its own;
      # the 1.5 MB lares.json leaking would still trip the cap).
      # See plan §A10 + performance #5.
      - name: Guard — client bundle size cap (Wizard ≤ 20 kB gz, total ≤ 90 kB gz)
        run: |
          set -e
          wizard=$(ls dist/_astro/Wizard*.js 2>/dev/null | head -1 || true)
          if [ -z "$wizard" ]; then
            echo "❌ Wizard chunk not found in dist/_astro/"
            ls dist/_astro/ || true
            exit 1
          fi
          wsize=$(gzip -c "$wizard" | wc -c | tr -d ' ')
          echo "Wizard chunk gzipped: ${wsize} bytes"
          if [ "$wsize" -ge 20000 ]; then
            echo "❌ Wizard chunk exceeds 20 kB gz (${wsize} bytes)"
            exit 1
          fi
          total=$(find dist/_astro -name '*.js' -exec gzip -c {} \; | wc -c | tr -d ' ')
          echo "Total client JS gzipped: ${total} bytes"
          if [ "$total" -ge 90000 ]; then
            echo "❌ Total client JS exceeds 90 kB gz (${total} bytes)"
            exit 1
          fi
          echo "✓ Bundle within budget"

      # ── set:html guard ───────────────────────────────────────────────
      # Any `set:html=` in pages/layouts must go through safeJsonForScript
      # (or be the explicit JSON-LD pattern that uses it). Prevents an
      # accidental {ld} interpolation from injecting unescaped </script>.
      # See plan §A11 + security #C.
      - name: Guard — set:html requires safeJsonForScript
        run: |
          set -e
          out=$(grep -rEn 'set:html=' src/pages src/layouts 2>/dev/null || true)
          if [ -z "$out" ]; then
            echo "✓ No set:html usages"
            exit 0
          fi
          bad=$(echo "$out" | grep -v 'safeJsonForScript' || true)
          if [ -n "$bad" ]; then
            echo "❌ set:html without safeJsonForScript:"
            echo "$bad"
            exit 1
          fi
          echo "✓ All set:html usages go through safeJsonForScript"

      # api/report.ts compiles only on Vercel (Edge runtime). CI must
      # still typecheck it so we never push a broken Edge Function.
      - name: Typecheck Vercel Edge Function (api/report.ts)
        run: npx tsc --noEmit --strict --target esnext --module esnext --moduleResolution bundler --lib esnext,dom api/report.ts

      # Surface CRITICAL/HIGH npm advisories. Doesn't fail on moderate
      # to avoid CI noise from transitive issues that don't apply here.
      - name: npm audit (high+ only)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
