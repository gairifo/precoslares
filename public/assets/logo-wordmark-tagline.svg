  <g transform="translate(4, 10) scale(0.9375)">
    <path d="M 4 28 L 19 11 L 34 28 L 34 56 L 4 56 Z" fill="#1E5BA8"/>
    <rect x="13" y="36" width="11" height="11" rx="1" fill="#FFFFFF"/>
    <polygon points="34,36 41,26 60,26 60,46 41,46" fill="#E8742C"/>
    <circle cx="43" cy="36" r="2" fill="#FFFFFF"/>
    <text x="51" y="42"
